<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人运营 Beta</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">今天</p>
        <h1 id="nowText">--:--</h1>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="dashboardConfigBtn" title="编辑首页看板">⚙</button>
        <button class="icon-btn" id="exportBtn" title="导出数据">↓</button>
      </div>
    </header>

    <section class="view active" data-view="dashboard">
      <div class="dashboard-grid" id="dashboardGrid"></div>

      <section class="panel">
        <div class="section-title">
          <h2>今日待办</h2>
          <button class="text-btn" data-tab-target="work">去工作</button>
        </div>
        <div id="todayTasks" class="compact-list"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>通知提醒</h2>
        </div>
        <div class="timeline" id="recentTimeline"></div>
      </section>
    </section>

    <section class="view" data-view="people">
      <div class="section-title">
        <h2>人际关系</h2>
        <button class="primary-btn" id="addPersonBtn">新增角色</button>
      </div>
      <div class="filter-row">
        <input id="personSearch" placeholder="搜索姓名、关系、简介">
        <select id="personCategory">
          <option value="">全部关系</option>
        </select>
        <button id="downloadPeopleTemplate">模板</button>
        <label class="file-btn">导入<input id="peopleImport" type="file" accept=".csv,.txt"></label>
      </div>

      <section class="panel">
        <div class="section-title compact">
          <h2>最近编辑</h2>
          <small>最近新增或修改的人</small>
        </div>
        <div id="recentPeople" class="person-strip"></div>
      </section>

      <section class="panel">
        <div class="section-title compact">
          <h2>常用分类</h2>
          <small>点击查看分类下的人</small>
        </div>
        <div id="relationStats" class="category-grid"></div>
      </section>

      <section class="panel">
        <div class="section-title compact">
          <h2 id="peopleListTitle">全部人物</h2>
          <button class="text-btn" id="clearPeopleFilterBtn">全部</button>
        </div>
        <div class="card-list" id="peopleList"></div>
      </section>

      <section class="map-panel">
        <div class="section-title compact">
          <h2>关系图</h2>
          <small>可新增多张关系网，拖动人物调整位置</small>
        </div>
        <div class="map-toolbar">
          <select id="networkSelect"></select>
          <button id="addNetworkBtn">新增关系网</button>
        </div>
        <div class="link-toolbar">
          <select id="linkFrom"></select>
          <select id="linkTo"></select>
          <input id="linkLabel" placeholder="关系说明">
          <button id="addLinkBtn">连线</button>
        </div>
        <div id="relationshipMap" class="relationship-map"></div>
      </section>
    </section>

    <section class="view" data-view="sport">
      <div class="section-title">
        <h2>运动</h2>
        <button class="primary-btn" id="saveSportBtn">保存记录</button>
      </div>
      <div class="form-grid">
        <label>身高(cm)<input id="heightInput" type="number" min="0" step="0.1"></label>
        <label>体重(kg)<input id="weightInput" type="number" min="0" step="0.1"></label>
        <label>当前心率<input id="heartInput" type="number" min="0"></label>
        <label>今日步数<input id="stepsInput" type="number" min="0"></label>
        <label>热量消耗<input id="calorieInput" type="number" min="0"></label>
        <label>运动时长(分钟)<input id="exerciseMinutesInput" type="number" min="0"></label>
        <label class="wide">昨晚睡眠<input id="sleepInput" placeholder="例如 7小时20分"></label>
      </div>
      <section class="panel">
        <div class="section-title compact">
          <h2>变化曲线</h2>
          <small>先用手动录入，后续接高驰</small>
        </div>
        <canvas id="weightChart" width="680" height="220"></canvas>
      </section>
      <section class="panel">
        <h2>运动记录</h2>
        <div id="sportHistory" class="compact-list"></div>
      </section>
    </section>

    <section class="view" data-view="study">
      <div class="section-title">
        <h2>学习</h2>
        <button class="primary-btn" id="addEnglishIdea">记录想法</button>
      </div>
      <section class="panel">
        <textarea id="studyNotes" placeholder="先把英语学习或其他学习想法写这里"></textarea>
        <div id="studyFeedback" class="toast-line"></div>
      </section>
      <section class="panel">
        <div class="section-title compact">
          <h2>想法历史</h2>
          <small>点击记录后会保存在这里</small>
        </div>
        <div id="studyIdeaHistory" class="compact-list"></div>
      </section>
    </section>

    <section class="view" data-view="work">
      <div class="section-title">
        <h2>工作</h2>
        <button class="primary-btn" id="addWorkBtn">新增任务</button>
      </div>
      <section class="panel">
        <div class="section-title compact">
          <h2>重点任务进度</h2>
          <button class="text-btn" id="addRecurringBtn">周期任务</button>
        </div>
        <div class="work-board" id="workList"></div>
      </section>
      <section class="panel">
        <div class="section-title compact">
          <h2>固定提醒</h2>
          <small>周报、会议材料、工单、专项奖励等</small>
        </div>
        <div id="recurringList" class="compact-list"></div>
      </section>
      <section class="panel">
        <div class="filter-row">
          <input id="workStart" type="date">
          <input id="workEnd" type="date">
          <button id="generatePromptBtn">生成总结 Prompt</button>
        </div>
        <textarea id="promptOutput" readonly placeholder="选择时间段后生成"></textarea>
      </section>
    </section>

    <section class="view" data-view="finance">
      <div class="section-title">
        <h2>理财</h2>
        <button class="primary-btn" id="addExpenseBtn">新增流水</button>
      </div>
      <div class="dashboard-grid two">
        <article class="metric-card"><span>日支出</span><strong id="daySpend">0 元</strong><small>今天已记录</small></article>
        <article class="metric-card"><span>月支出</span><strong id="monthSpend">0 元</strong><small>本月已审核</small></article>
      </div>
      <section class="panel">
        <div class="section-title compact">
          <h2>快速录入</h2>
          <small>支付宝和微信导入下月再做</small>
        </div>
        <div class="finance-form">
          <input id="quickExpenseName" placeholder="项目，例如 午餐">
          <input id="quickExpenseAmount" type="number" min="0" step="0.01" placeholder="金额">
          <select id="quickExpenseCategory">
            <option>餐饮</option>
            <option>交通</option>
            <option>零食</option>
            <option>购物</option>
            <option>医疗</option>
            <option>住房</option>
            <option>其他</option>
          </select>
          <button id="quickExpenseBtn">记一笔</button>
        </div>
      </section>
      <section class="panel">
        <div class="section-title compact">
          <h2>最近7日支出</h2>
          <small id="weekSpendTotal">总计 0 元</small>
        </div>
        <div class="bar-chart" id="financeWeekChart"></div>
      </section>
      <section class="panel">
        <div class="filter-row">
          <label class="file-btn">截图导入<input id="billImage" type="file" accept="image/*" multiple></label>
          <label class="file-btn">CSV导入<input id="expenseImport" type="file" accept=".csv,.txt"></label>
          <button id="downloadExpenseTemplate">模板</button>
        </div>
        <div id="expenseList" class="card-list"></div>
      </section>
    </section>

    <section class="view" data-view="travel">
      <div class="section-title">
        <h2>出行</h2>
        <button class="primary-btn" id="addTripBtn">新增记录</button>
      </div>
      <div class="segmented">
        <button class="active" data-travel-mode="record">出行记录</button>
        <button data-travel-mode="plan">出行规划</button>
      </div>
      <section class="canvas-panel">
        <div class="section-title compact">
          <h2>无边画框</h2>
          <small>基础信息卡片 + 飞书文档链接</small>
        </div>
        <div id="tripCanvas" class="trip-canvas"></div>
      </section>
      <section class="panel">
        <h2>列表</h2>
        <div id="tripList" class="card-list"></div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="active" data-tab="dashboard">首页</button>
    <button data-tab="people">人际</button>
    <button data-tab="sport">运动</button>
    <button data-tab="study">学习</button>
    <button data-tab="work">工作</button>
    <button data-tab="finance">理财</button>
    <button data-tab="travel">出行</button>
  </nav>

  <dialog id="editorDialog">
    <form method="dialog" id="editorForm">
      <div class="dialog-head">
        <h2 id="dialogTitle">编辑</h2>
        <button value="cancel" class="icon-btn">×</button>
      </div>
      <div id="editorFields" class="form-grid"></div>
      <menu>
        <button value="cancel">取消</button>
        <button id="saveDialogBtn" value="default" class="primary-btn">保存</button>
      </menu>
    </form>
  </dialog>

  <dialog id="dashboardDialog">
    <form method="dialog" id="dashboardForm">
      <div class="dialog-head">
        <h2>首页看板设置</h2>
        <button value="cancel" class="icon-btn">×</button>
      </div>
      <div id="dashboardFields" class="dashboard-settings"></div>
      <menu>
        <button value="cancel">取消</button>
        <button id="saveDashboardBtn" value="default" class="primary-btn">保存</button>
      </menu>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
